<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Корзина — FoodAdapter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top glass-nav">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <span class="brand-mark"><i class="fa-solid fa-bolt"></i></span>
                FoodAdapter
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                    <li class="nav-item"><a class="nav-link" href="index.html#restaurants">Рестораны</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#menu">Меню</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#adapter">Адаптер</a></li>
                    <li class="nav-item">
                        <a class="btn btn-dark nav-cart" href="cart.html">
                            <i class="fa-solid fa-bag-shopping"></i>
                            Корзина <span class="badge rounded-pill">2</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="cart-hero">
        <div class="container">
            <span class="eyebrow">Оформление</span>
            <h1>Ваша корзина</h1>
        </div>
    </section>

    <section class="section-pad">
        <div class="container">
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="cart-list glass-card">
                        <div class="cart-item" data-id="pizza-margherita">
                            <img src="https://images.unsplash.com/photo-1604382354936-07c5d9983bd3?auto=format&fit=crop&w=900&q=80" alt="Маргарита Клауд">
                            <div class="cart-item-info">
                                <h3>Маргарита Клауд</h3>
                                <span>3290 тг</span>
                            </div>
                            <div class="quantity-control">
                                <button class="quantity-btn" disabled><i class="fa-solid fa-minus"></i></button>
                                <input type="number" value="1" min="1" disabled>
                                <button class="quantity-btn" disabled><i class="fa-solid fa-plus"></i></button>
                            </div>
                            <strong>3290 тг</strong>
                            <button class="remove-btn" disabled title="Удалить"><i class="fa-solid fa-trash"></i></button>
                        </div>
                        <div class="cart-item" data-id="burger-smash">
                            <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=900&q=80" alt="Смэш Бургер">
                            <div class="cart-item-info">
                                <h3>Смэш Бургер</h3>
                                <span>2790 тг</span>
                            </div>
                            <div class="quantity-control">
                                <button class="quantity-btn" disabled><i class="fa-solid fa-minus"></i></button>
                                <input type="number" value="1" min="1" disabled>
                                <button class="quantity-btn" disabled><i class="fa-solid fa-plus"></i></button>
                            </div>
                            <strong>2790 тг</strong>
                            <button class="remove-btn" disabled title="Удалить"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <aside class="checkout-card glass-card">
                        <h2>Ваш заказ</h2>
                        <div class="summary-line">
                            <span>Блюд</span>
                            <strong>2</strong>
                        </div>
                        <div class="summary-line total">
                            <span>Итого</span>
                            <strong>5000 тг</strong>
                        </div>

                        <form>
                            <label class="form-label">Имя клиента</label>
                            <input class="form-control" name="customer_name" value="Гость FoodAdapter" required>

                            <label class="form-label mt-3">Адрес доставки</label>
                            <input class="form-control" name="address" value="Центр города, 24" required>

                            <label class="form-label mt-3">Служба доставки</label>
                            <div class="delivery-options">
                                <label><input type="radio" name="delivery_service" value="glovo" checked> Glovo</label>
                                <label><input type="radio" name="delivery_service" value="wolt"> Wolt</label>
                                <label><input type="radio" name="delivery_service" value="yandex"> Yandex Delivery</label>
                            </div>
                            <a class="btn btn-dark w-100 btn-lg mt-4" href="checkout.html">Оформить заказ</a>
                        </form>
                    </aside>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
